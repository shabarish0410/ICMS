version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: icms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: icms_user
      POSTGRES_PASSWORD: icms_password
      POSTGRES_DB: icms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icms_user -d icms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: icms_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://icms_user:icms_password@db:5432/icms_db
      SECRET_KEY: change-this-to-a-secure-random-string-in-production
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: icms_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # pgAdmin (optional database UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: icms_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@icms.edu
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - db

volumes:
  postgres_data:
  backend_uploads:
